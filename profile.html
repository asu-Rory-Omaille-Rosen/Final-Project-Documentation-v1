<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="author" content="Rory O'Maille"/>
  <title>Build Your Profile</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen">

 
  <header class="w-full py-4">
    <nav class="max-w-7xl mx-auto flex items-center justify-between px-6">
      <div class="text-2xl font-bold">Ice Breakers</div>
      <ul class="hidden md:flex space-x-8 text-lg">
        <li><a href="index.html" class="hover:text-blue-600 transition">Home</a></li>
        <li><a href="profile.html" class="hover:text-blue-600 transition">Profile</a></li>
        <li><a href="ConvoCard.html" class="hover:text-blue-600 transition">Conversation Starters</a></li>
       
      </ul>
      <button class="md:hidden text-2xl">☰</button>
    </nav>
  </header>

  <section class="w-full py-16 bg-white">
    <div class="max-w-7xl mx-auto px-6">

      <h1 class="text-4xl font-extrabold mb-10">Build Your Profile</h1>

     
      <div class="grid grid-cols-1 md:grid-cols-2 gap-12">




          <!-- Ice Breakers   -->
              <div class="flex items-center gap-6">
    <div>
      <img id="profile-pic" 
           alt="place-holder-for-pfp"
           src="https://via.placeholder.com/100"
           class="w-24 h-24 rounded-full object-cover border" />
      <input id="profile-pic-input" type="file" accept="image/*"
             class="mt-3 text-sm text-gray-600" />
    </div>

    <div class="flex-1">
      <input id="profile-name"
             type="text"
             placeholder="Your Name"
             class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-blue-500" />
      <textarea id="profile-bio"
                placeholder="Write a short bio..."
                class="w-full mt-3 px-4 py-3 border rounded-lg focus:ring-2 focus:ring-blue-500"></textarea>
    </div>
  </div>

  <!-- Social Links -->
  <div>
    <h2 class="text-xl font-semibold mb-3">Social Links</h2>
    <input id="profile-twitter"
           type="text"
           placeholder=" X or Threads"
           class="w-full px-4 py-3 border rounded-lg mb-3" />
    <input id="profile-instagram"
           type="text"
           placeholder="Instagram"
           class="w-full px-4 py-3 border rounded-lg" />
  </div>

          <div>
            <h2 class="text-2xl font-semibold mb-3">Your Ice-breakers</h2>
            <p class="text-gray-600 mb-4">
              These can be anything you'd love to go on a passionate ramble about or some new fixation of the day
            </p>

            <div class="flex gap-3 mb-4">
              <input id="icebreaker-input"
                     type="text"
                     placeholder="Ask me about my favorite Pokémon"
                     class="flex-1 px-4 py-3 border rounded-lg" />

              <button onclick="addIceBreaker()"
                      class="px-5 py-3 bg-black text-white rounded-lg hover:bg-gray-500">
                Add
              </button>
            </div>

            <ul id="icebreaker-list" class="space-y-3"></ul>
              
           <button onclick="saveProfile()"
                  class="w-full py-3 bg-black text-white rounded-lg hover:bg-gray-500">
            Save Profile
          </button> 
          </div>

          

          
        <div>
        

      <div class="w-full h-80 md:h-full rounded-xl overflow-hidden shadow-lg">
        <img 
          src="img/Antarctica-p2.jpg"" 
          alt="Ice floating in ocean water" 
          class="w-full h-full object-cover"
        />
      </div>

      
      </div>
    </div>
  </section>

  <script src="index.js"></script>
</body>
</html>
